<!DOCTYPE html>
<html>
<head>
    <title>AR视频卡片</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/dist/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; detectionMode: mono; maxDetectionRate: 30; trackingMethod: best;"
        renderer="antialias: true; precision: medium;"
    >
        <a-nft
            type="nft"
            url="./marker"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5"
        >
            <a-video
                src="./8.mp4"
                width="5"
                height="3"
                position="0 0 0"
                rotation="-90 0 0"
                loop="true"
                autoplay="true"
                playsinline="true"
                volume="1"
            ></a-video>
        </a-nft>

        <a-entity camera look-controls></a-entity>
    </a-scene>
</body>
</html>
