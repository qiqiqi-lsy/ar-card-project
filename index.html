<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no" />
  <title>AR Card</title>
  <!-- 最稳定不白屏的CDN -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/dist/ar-nft.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #arjs-video { position: fixed; width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <video id="arjs-video" autoplay playsinline muted></video>

  <script>
    const video = document.getElementById('arjs-video');
    const api = new ARnft({
      video: video,
      canvas: document.createElement('canvas'),
      matrixCodeType: '3x3',
      cameraParametersUrl: 'https://raw.githubusercontent.com/artoolkitx/artoolkit5-js/master/build/Data/camera_para.dat',
      markerUrl: 'https://raw.githubusercontent.com/qiqiqi-lsy/ar-card-project/main/markers/marker'
    });

    api.onMarkerFound = () => {
      console.log('识别到标记');
    };

    api.onMarkerLost = () => {
      console.log('标记丢失');
    };
  </script>
</body>
</html>
