<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
  <title>AR Video Card</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene
    arjs="sourceType: webcam; detectionMode: mono; trackingMethod: best;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true"
  >
    <a-nft type="nft" url="./marker" smooth="true" smoothCount="5">
      <a-video
        src="./8.mp4"
        width="5"
        height="3"
        position="0 0 0"
        rotation="-90 0 0"
        loop
        autoplay
        playsinline
      ></a-video>
    </a-nft>

    <a-entity camera look-controls></a-entity>
  </a-scene>

  <script>
    document.addEventListener('click', () => {
      const vidEl = document.querySelector('a-video');
      if (vidEl && vidEl.components.material?.material?.map?.image) {
        vidEl.components.material.material.map.image.play();
      }
    });
  </script>
</body>
</html>
