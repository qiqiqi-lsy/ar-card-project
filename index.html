<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 卡片（识别版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        #video { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            display: none; 
            z-index: 10;
        }
        #camera { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }
        #tip { 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        #canvas { display: none; }
    </style>
</head>
<body>
    <video id="video" src="https://www.w3school.com.cn/i/movie.mp4" loop muted playsinline></video>
    <video id="camera" autoplay playsinline></video>
    <div id="tip">请对准 marker.png</div>
    <canvas id="canvas"></canvas>

    <script>
        const camera = document.getElementById('camera');
        const video = document.getElementById('video');
        const tip = document.getElementById('tip');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let markerImg = new Image();
        let markerLoaded = false;
        let detected = false;

        // 加载 marker.png 作为识别模板
        markerImg.src = 'marker.png';
        markerImg.onload = () => {
            markerLoaded = true;
            canvas.width = markerImg.width;
            canvas.height = markerImg.height;
        };

        // 打开后置摄像头
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' } 
        }).then(stream => {
            camera.srcObject = stream;
        }).catch(err => {
            tip.textContent = '请允许摄像头权限';
        });

        // 简单模板匹配识别（模拟 marker 检测）
        function detectMarker() {
            if (!markerLoaded || detected) return;
            
            // 把摄像头画面画到 canvas 上
            ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
            const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            
            // 简单模拟：只要画面亮度足够，就认为识别到 marker
            // （真实项目可替换为更精确的图像识别算法）
            let brightPixels = 0;
            for (let i = 0; i < frameData.length; i += 4) {
                const r = frameData[i];
                const g = frameData[i+1];
                const b = frameData[i+2];
                const brightness = (r + g + b) / 3;
                if (brightness > 100) brightPixels++;
            }
            
            // 当画面中亮像素占比超过 30%，判定为识别成功
            if (brightPixels / (canvas.width * canvas.height) > 0.3) {
                detected = true;
                tip.style.display = 'none';
                video.style.display = 'block';
                video.play();
            }
        }

        // 每 200ms 检测一次
        setInterval(detectMarker, 200);
    </script>
</body>
</html>
