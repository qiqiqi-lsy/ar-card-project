<!DOCTYPE html>
<html>
  <head>
    <title>AR Card Video</title>
    <!-- A-Frame 基础库 -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <!-- 提速版 AR.js NFT 库（替换了原 githack 源，国内访问更快） -->
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@1.4.2/aframe/build/aframe-ar-nft.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; detectionMode: mono; maxDetectionRate: 30;"
      renderer="logDepthBuffer: true;"
    >
      <!-- NFT 追踪器（匹配你的 marker 文件） -->
      <a-nft
        type="nft"
        url="./marker"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
      >
        <!-- 叠加在照片上的视频 -->
        <a-video
          src="./8.mp4"
          width="5"
          height="3"
          position="0 0 0"
          rotation="-90 0 0"
          loop="true"
          autoplay="true"
          playsinline="true"
        ></a-video>
      </a-nft>

      <!-- 相机控制 -->
      <a-entity camera look-controls></a-entity>
    </a-scene>
  </body>
</html>
